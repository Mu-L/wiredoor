[program:fluent-bit]
command=/usr/bin/fluent-bit -c /etc/fluent-bit/fluent-bit.conf
stopsignal=KILL
stopasgroup=true
killasgroup=true
autostart=true
autorestart=true
startretries=5
numprocs=1
startsecs=0
redirect_stderr=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0

stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

